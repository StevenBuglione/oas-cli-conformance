openapi: 3.1.0
info:
  title: Example Tickets API
  version: "2026-03-01"
servers:
  - url: https://api.example.com/v1
paths:
  /tickets:
    get:
      operationId: listTickets
      tags: [tickets]
      summary: List tickets
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
    post:
      operationId: createTicket
      tags: [tickets]
      summary: Create ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                description:
                  type: string
      responses:
        "201":
          description: Created
  /tickets/{id}:
    get:
      operationId: getTicket
      tags: [tickets]
      summary: Get a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
  /tickets/archive:
    post:
      operationId: archiveTickets
      tags: [tickets]
      summary: Archive tickets
      responses:
        "202":
          description: Accepted
  /admin/tickets:
    delete:
      operationId: purgeTickets
      tags: [admin]
      summary: Purge tickets
      responses:
        "204":
          description: Deleted
